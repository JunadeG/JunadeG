<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%" height="180">
  <defs>
    <!-- Background Canvas -->
    <linearGradient id="panelBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>

    <!-- Glowing Green Status Accent -->
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#238636" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3FB950" stop-opacity="0.8"/>
    </linearGradient>

    <style>
      .test-text { font-family: 'JetBrains Mono', Consolas, monospace; font-size: 13px; fill: #8B949E; }
      .test-val { fill: #58A6FF; font-weight: bold; }
      .test-label { fill: #C9D1D9; }
      
      /* Glowing Success Badge styling */
      .badge-success { fill: #238636; }
      .badge-text { font-family: -apple-system, sans-serif; font-weight: bold; font-size: 11px; fill: #FFFFFF; }
      
      /* Pulse effect for pass indicators */
      .pass-indicator { fill: #3FB950; font-weight: bold; animation: pulse-pass 2s infinite alternate; }
      @keyframes pulse-pass {
        0% { opacity: 0.7; }
        100% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- External Frame -->
  <rect x="5" y="5" width="790" height="170" rx="8" fill="url(#panelBg)" stroke="#30363D" stroke-width="1.5"/>

  <!-- Top Header Title -->
  <text x="25" y="30" class="test-text" style="font-weight: bold; fill: #58A6FF; font-size: 11px; letter-spacing: 1.5px;">AUTOMATED TESTING ENGINE // JUNIT &amp; SELENIUM SUITE</text>
  <line x1="25" y1="40" x2="775" y2="40" stroke="#30363D" stroke-width="1"/>

  <!-- Left Column: Executed Test Suites -->
  <g transform="translate(25, 65)">
    <!-- Test 1 -->
    <text x="0" y="0" class="test-text pass-indicator">[ PASS ]</text>
    <text x="75" y="0" class="test-text test-label">TenantRoutingFilterTest</text>
    <text x="320" y="0" class="test-text" style="fill: #8B949E; font-size: 11px;">(12ms)</text>

    <!-- Test 2 -->
    <text x="0" y="25" class="test-text pass-indicator">[ PASS ]</text>
    <text x="75" y="25" class="test-text test-label">PayrollCalculationEngineTest</text>
    <text x="320" y="25" class="test-text" style="fill: #8B949E; font-size: 11px;">(142ms)</text>

    <!-- Test 3 -->
    <text x="0" y="50" class="test-text pass-indicator">[ PASS ]</text>
    <text x="75" y="50" class="test-text test-label">JWTAuthenticationFilterTest</text>
    <text x="320" y="50" class="test-text" style="fill: #8B949E; font-size: 11px;">(8ms)</text>

    <!-- Test 4 -->
    <text x="0" y="75" class="test-text pass-indicator">[ PASS ]</text>
    <text x="75" y="75" class="test-text test-label">SeleniumE2EAttendanceTest</text>
    <text x="320" y="75" class="test-text" style="fill: #8B949E; font-size: 11px;">(1.42s)</text>
  </g>

  <!-- Vertical Divider Line -->
  <line x1="450" y1="50" x2="450" y2="155" stroke="#30363D" stroke-width="1" stroke-dasharray="4"/>

  <!-- Right Column: Pipeline Run Metadata -->
  <g transform="translate(480, 65)">
    <text x="0" y="0" class="test-text test-label">Pipeline Status:</text>
    <rect x="130" y="-13" width="75" height="18" rx="3" class="badge-success"/>
    <text x="167" y="0" text-anchor="middle" class="badge-text">SUCCESSFUL</text>

    <text x="0" y="25" class="test-text test-label">Total Executed:</text>
    <text x="130" y="25" class="test-text test-val">142 Suites</text>

    <text x="0" y="50" class="test-text test-label">Code Coverage:</text>
    <text x="130" y="50" class="test-text" style="fill: #3FB950; font-weight: bold;">94.2% (Jacoco)</text>

    <text x="0" y="75" class="test-text test-label">Build Duration:</text>
    <text x="130" y="75" class="test-text test-val">1m 24s</text>
  </g>
</svg>
