<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117" />
      <stop offset="100%" stop-color="#161B22" />
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1F6FEB" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0.5"/>
    </linearGradient>
    <style>
      .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #C9D1D9; }
      .title { font-weight: 800; font-size: 14px; fill: #58A6FF; letter-spacing: 1px; text-transform: uppercase; }
      .tech { font-weight: 600; font-size: 16px; }
      .dot { fill: #1F6FEB; }
      .box { animation: glow 4s ease-in-out infinite alternate; }
      @keyframes glow {
        0% { filter: drop-shadow(0 0 2px rgba(88,166,255,0.2)); }
        100% { filter: drop-shadow(0 0 8px rgba(88,166,255,0.6)); }
      }
    </style>
  </defs>

  <!-- Card Background -->
  <rect x="5" y="5" width="790" height="110" rx="8" fill="url(#bg)" stroke="url(#border)" stroke-width="1.5" class="box"/>
  
  <!-- Content -->
  <text x="400" y="40" text-anchor="middle" class="text title">Backend Architecture</text>
  
  <g transform="translate(0, 75)" class="text tech" text-anchor="middle">
    <!-- Java -->
    <text x="160">Java</text>
    <circle cx="230" cy="-5" r="4" class="dot"/>
    
    <!-- Spring Boot -->
    <text x="310">Spring Boot</text>
    <circle cx="395" cy="-5" r="4" class="dot"/>
    
    <!-- PostgreSQL -->
    <text x="475">PostgreSQL</text>
    <circle cx="550" cy="-5" r="4" class="dot"/>
    
    <!-- MySQL / JWT -->
    <text x="630">MySQL &amp; JWT</text>
  </g>
</svg>
