<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" height="280">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1F6FEB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8B949E"/>
    </linearGradient>

    <!-- CSS Animations & Styling -->
    <style>
      .title { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; 
        font-size: 68px; 
        font-weight: 800; 
        fill: url(#textGrad); 
        letter-spacing: 6px; 
      }
      .subtitle { 
        font-family: 'JetBrains Mono', Consolas, monospace; 
        font-size: 24px; 
        fill: #58A6FF; 
        letter-spacing: 1px;
      }
      .pulse { animation: pulse-anim 4s ease-in-out infinite alternate; }
      @keyframes pulse-anim { 
        0% { opacity: 0.5; transform: scale(0.98); transform-origin: center; } 
        100% { opacity: 1; transform: scale(1.02); transform-origin: center; } 
      }
      .float { animation: float-anim 6s ease-in-out infinite; }
      @keyframes float-anim {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
    </style>
  </defs>

  <!-- Base Dark Background -->
  <rect width="1200" height="280" fill="#0D1117"/>
  
  <!-- Animated Glow -->
  <rect width="1200" height="280" fill="url(#glow)" class="pulse"/>
  
  <!-- Subtle Engineering Grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="280" fill="url(#grid)"/>

  <!-- Typography -->
  <g class="float">
    <text x="600" y="145" text-anchor="middle" class="title">JUNADE GOVENDER</text>
    <text x="600" y="205" text-anchor="middle" class="subtitle">Backend Engineer • Java • Spring Boot</text>
  </g>
</svg>
