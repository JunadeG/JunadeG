<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 220" width="100%" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161B22" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
    <linearGradient id="borderGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2EA043" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#238636" stop-opacity="0.2"/>
    </linearGradient>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 800; font-size: 22px; fill: #FFFFFF; }
      .desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #8B949E; }
      .tag-text { font-family: 'JetBrains Mono', monospace, sans-serif; font-size: 12px; font-weight: 600; fill: #2EA043; }
      .card { transition: all 0.3s ease; }
      .card:hover { transform: translateY(-5px); }
    </style>
  </defs>

  <!-- Background -->
  <rect x="5" y="5" width="440" height="210" rx="12" fill="url(#bg)" stroke="url(#borderGrad2)" stroke-width="2" class="card"/>
  
  <!-- Database/API Icon -->
  <path d="M 30 50 C 30 45 45 40 60 40 C 75 40 90 45 90 50 C 90 55 75 60 60 60 C 45 60 30 55 30 50 Z" fill="none" stroke="#2EA043" stroke-width="2"/>
  <path d="M 30 50 L 30 80 C 30 85 45 90 60 90 C 75 90 90 85 90 80 L 90 50" fill="none" stroke="#2EA043" stroke-width="2"/>
  <path d="M 30 65 C 30 70 45 75 60 75 C 75 75 90 70 90 65" fill="none" stroke="#2EA043" stroke-width="2"/>

  <!-- Text Content -->
  <text x="110" y="70" class="title">Secure REST API</text>
  
  <text x="30" y="125" class="desc">High-performance microservice with role-based</text>
  <text x="30" y="145" class="desc">access control, Dockerized for scalability.</text>
  
  <!-- Tags -->
  <rect x="30" y="170" width="60" height="24" rx="12" fill="#2EA043" fill-opacity="0.1" stroke="#2EA043" stroke-opacity="0.3"/>
  <text x="60" y="186" text-anchor="middle" class="tag-text">Java</text>

  <rect x="100" y="170" width="120" height="24" rx="12" fill="#2EA043" fill-opacity="0.1" stroke="#2EA043" stroke-opacity="0.3"/>
  <text x="160" y="186" text-anchor="middle" class="tag-text">Spring Security</text>

  <rect x="230" y="170" width="70" height="24" rx="12" fill="#2EA043" fill-opacity="0.1" stroke="#2EA043" stroke-opacity="0.3"/>
  <text x="265" y="186" text-anchor="middle" class="tag-text">Docker</text>
</svg>
