<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 220" width="100%" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161B22" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0.2"/>
    </linearGradient>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 800; font-size: 22px; fill: #FFFFFF; }
      .desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #8B949E; }
      .tag-text { font-family: 'JetBrains Mono', monospace, sans-serif; font-size: 12px; font-weight: 600; fill: #58A6FF; }
      .card { transition: all 0.3s ease; }
      .card:hover { transform: translateY(-5px); }
    </style>
  </defs>

  <!-- Background -->
  <rect x="5" y="5" width="440" height="210" rx="12" fill="url(#bg)" stroke="url(#borderGrad)" stroke-width="2" class="card"/>
  
  <!-- Folder Icon -->
  <path d="M 30 40 L 50 40 L 60 55 L 95 55 A 5 5 0 0 1 100 60 L 100 85 A 5 5 0 0 1 95 90 L 30 90 A 5 5 0 0 1 25 85 L 25 45 A 5 5 0 0 1 30 40 Z" fill="none" stroke="#58A6FF" stroke-width="2"/>

  <!-- Text Content -->
  <text x="120" y="70" class="title">Enterprise HRMS</text>
  
  <text x="30" y="125" class="desc">Multi-tenant architecture for payroll automation,</text>
  <text x="30" y="145" class="desc">attendance tracking, and secure JWT auth.</text>
  
  <!-- Tags -->
  <rect x="30" y="170" width="95" height="24" rx="12" fill="#1F6FEB" fill-opacity="0.1" stroke="#1F6FEB" stroke-opacity="0.3"/>
  <text x="77" y="186" text-anchor="middle" class="tag-text">Spring Boot</text>

  <rect x="135" y="170" width="70" height="24" rx="12" fill="#1F6FEB" fill-opacity="0.1" stroke="#1F6FEB" stroke-opacity="0.3"/>
  <text x="170" y="186" text-anchor="middle" class="tag-text">React</text>

  <rect x="215" y="170" width="95" height="24" rx="12" fill="#1F6FEB" fill-opacity="0.1" stroke="#1F6FEB" stroke-opacity="0.3"/>
  <text x="262" y="186" text-anchor="middle" class="tag-text">PostgreSQL</text>
</svg>
