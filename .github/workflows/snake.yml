name: Generate Snake Animation

on:
  schedule:
    # Runs automatically at midnight every day
    - cron: "0 0 * * *" 
  
  # Allows you to manually trigger the workflow anytime
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate GitHub Contribution Grid Snake
        uses: Platane/snk@v3
        with:
          github_user_name: JunadeG
          # Generates a dark themed SVG with a custom GitHub Blue snake
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#58A6FF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
